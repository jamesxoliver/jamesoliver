<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branch Three — James Oliver</title>
<style>
/* The whole design system. ~30 lines that do the work. */

body {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 18px;
  line-height: 1.6;
  color: #1a1a1a;
  max-width: 38rem;          /* ~65-70 chars per line */
  margin: 4rem auto;
  padding: 0 1.25rem;
}

a { color: #1a1a1a; text-decoration: underline; text-underline-offset: 3px; }

/* listing titles: structure marks them as links; underline on hover only */
.papers a, .branch h2 a, .up a { text-decoration: none; }
.papers a:hover, .branch h2 a:hover, .up a:hover { text-decoration: underline; }

h1 { font-size: 1.6rem; line-height: 1.25; margin: 0 0 0.25rem; }
h2 { font-size: 1.15rem; margin: 2.5rem 0 0.5rem; }

.tagline { color: #555; font-style: italic; margin: 0 0 2.5rem; }

/* breadcrumb / nav back up the tree */
.up { font-size: 0.9rem; color: #555; margin-bottom: 2rem; }

/* paper listings within a branch or index */
.papers { list-style: none; padding: 0; margin: 0; }
.papers li { margin: 0 0 1.4rem; }
.papers .desc { color: #444; font-size: 0.95rem; display: block; margin-top: 0.15rem; }

/* branch headings on the index */
.branch { margin-top: 2.5rem; }
.branch h2 { margin-bottom: 0.75rem; }

/* the actions row at the foot of a paper */
.actions {
  margin-top: 3rem;
  padding-top: 1.25rem;
  border-top: 1px solid #ddd;
  font-size: 0.95rem;
  color: #555;
}
.actions a { margin-right: 1.25rem; }

/* paper body prose */
.paper p { margin: 0 0 1.1rem; }

/* details-variant index */
details.branch summary { cursor: pointer; font-size: 1.15rem; margin: 1.5rem 0 0.5rem; }
details.branch[open] summary { margin-bottom: 0.75rem; }
details.branch ul.papers { margin-left: 1.25rem; }

/* nested branch tree on the root index */
ul.tree { list-style: none; padding: 0; margin: 0; }
ul.tree ul.tree { padding-left: 1.5rem; margin-top: 0.4rem; }
ul.tree li { margin: 0 0 0.6rem; }

/* nested details indentation */
details.branch details.branch { margin-left: 1.5rem; }
details.branch ul.papers li { margin-bottom: 0.5rem; }
</style>
</head>
<body>

<div class="up"><a href="../">James Oliver</a></div>

<h1>Branch Three</h1>
<p class="tagline">The parent claim that unites these papers goes here.</p>

<ul class="papers">
  <li><a href="paper-epsilon.html">Paper Epsilon</a></li>
</ul>

</body>
</html>
